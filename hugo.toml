baseURL = 'https://Hangsau.github.io/ai-agent-handbook/'
defaultContentLanguage = 'zh-tw'
title = 'AI Agent Handbook'
theme = 'hextra'
copyright = '© 2026 AI Agent Handbook · CC BY 4.0'

# Hextra 推薦
enableRobotsTXT = true
hasCJKLanguage = true

# Markdown rendering（Hextra 預設）
[markup]
  [markup.goldmark]
    renderer.unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]

[markup.highlight]
  noClasses = false

enableInlineShortcodes = true

# 模組（hugo 0.146+ 必要）
[module]
  [module.hugoVersion]
    extended = true
    min = "0.146.0"

# 導覽列
[[menu.main]]
  name = 'GitHub'
  url = 'https://github.com/Hangsau/ai-agent-handbook'
  weight = 10

[[menu.main]]
  name = '開始閱讀'
  pageRef = '/docs'
  weight = 1

[[menu.main]]
  name = '學習路徑'
  pageRef = '/learning-path'
  weight = 2

# Hextra params
[params]
  description = 'AI agent 領域的 2026 H1 全景教學網站，用 AI agent 第一人稱視角講自己的故事。'
  externalLinkDecoration = true

  # 主題（light / dark / system）
  [params.theme]
    default = 'system'
    displayToggle = true

  # 導覽列
  [params.navbar]
    displayTitle = true
    displayLogo = false
    width = 'wide'

  # footer
  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = true
    width = 'normal'

  # Search
  [params.search]
    enable = true
    type = 'flexsearch'
    [params.search.flexsearch]
      index = 'content'
      tokenize = 'forward'

  # 頁面設定
  [params.page]
    width = 'normal'
    [params.page.contextMenu]
      enable = true
      links = []

  [params.toc]
    displayTags = true

displayUpdatedDate = true
dateFormat = "2006-01-02"
